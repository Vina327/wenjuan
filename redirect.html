<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>问卷分流</title>
</head>
<body>
    <script>
        // 替换成你的3个问卷完整链接（必须带https://）
        const urls = [
            "https://v.wjx.cn/vm/OMMVewN.aspx#",
            "https://v.wjx.cn/vm/wdAGJg2.aspx#",
            "https://v.wjx.cn/vm/hQLFg7V.aspx#"
        ];
        // 全局随机分配（每个用户独立随机，绝对平均，不受本地缓存影响）
        const randomIndex = Math.floor(Math.random() * urls.length);
        window.location.href = urls[randomIndex];
    </script>
</body>
</html>
