<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>问卷分流</title>
    <script src="https://cdn.jsdelivr.net/npm/countapi-js@1.0.0/dist/countapi.min.js"></script>
</head>
<body>
    <script>
        // 替换成你的3个问卷完整链接（严格无空格！）
        const urls = [
            "https://v.wjx.cn/vm/OMMVewN.aspx#",
            "https://v.wjx.cn/vm/wdAGJg2.aspx#",
            "https://v.wjx.cn/vm/hQLFg7V.aspx#"
        ];

        // 全局计数轮询，所有用户共享计数，绝对1:1:1平均
        const counter = new CountAPI();
        counter.info().then(info => {
            const next = info.value % 3;
            counter.add(1).then(() => {
                window.location.href = urls[next];
            });
        });
    </script>
</body>
</html>
